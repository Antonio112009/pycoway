name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Determine bump type from PR labels
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"major"'; then
            echo "part=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "part=minor" >> "$GITHUB_OUTPUT"
          else
            echo "part=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          FILE="src/cowayaio/__version__.py"
          CURRENT=$(python3 -c "exec(open('$FILE').read()); print(__version__)")
          IFS='.' read -r major minor patch <<< "$CURRENT"

          PART="${{ steps.bump.outputs.part }}"
          if [ "$PART" = "major" ]; then
            major=$((major + 1)); minor=0; patch=0
          elif [ "$PART" = "minor" ]; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          NEW="${major}.${minor}.${patch}"
          echo "__version__ = \"${NEW}\"" > "$FILE"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW ($PART)"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/cowayaio/__version__.py
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
