name: Version label check

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
    branches: [main]

concurrency:
  group: version-label-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Only development can target main
        if: github.head_ref != 'development'
        run: |
          echo "::error::Only the 'development' branch can target 'main'. Got '${{ github.head_ref }}'."
          exit 1

  version-label:
    runs-on: ubuntu-latest
    steps:
      - name: Require version label
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -qE '"(major|minor|patch)"'; then
            echo "Version label found."
          else
            echo "::error::PR to main must have a version label: major, minor, or patch."
            exit 1
          fi
